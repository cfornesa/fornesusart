name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy (attempt 1)
        id: ftp_deploy_1
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/.agents/**
            **/.gemini/**
            .env
            public/debug_auth.php

      - name: Wait before retry 1
        if: steps.ftp_deploy_1.outcome == 'failure'
        run: sleep 30

      - name: FTP Deploy (attempt 2)
        id: ftp_deploy_2
        if: steps.ftp_deploy_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/.agents/**
            **/.gemini/**
            .env
            public/debug_auth.php

      - name: Wait before retry 2
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure'
        run: sleep 30

      - name: FTP Deploy (attempt 3)
        id: ftp_deploy_3
        if: steps.ftp_deploy_1.outcome == 'failure' && steps.ftp_deploy_2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.claude/**
            **/.agents/**
            **/.gemini/**
            .env
            public/debug_auth.php
